# NOTES: This CI workflow is scheduled to be integrated with the existing Windows CI workflow in the future.

name: Build (Windows on ARM)

on:
    workflow_call:
        inputs:
            NIGHTLY:
                default: false
                type: boolean
    workflow_dispatch:

jobs:
    build:
        name: ${{ matrix.os }}-arm64
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [windows-11-arm]
        env:
            GH_TOKEN: ${{ github.token }}
            QT_VERSION: 6.8.3
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install dependencies
              run: |
                choco install --no-progress ninja wixtoolset
                
                Invoke-WebRequest -Uri "https://slproweb.com/download/WinUniversalOpenSSL-3_6_2.exe" -OutFile WinUniversalOpenSSL-3_6_2.exe
                Start-Process -FilePath .\WinUniversalOpenSSL-3_6_2.exe -ArgumentList '/ALLUSERS /verysilent /dir="C:\dev\OpenSSL"' -Wait

            - name: Install Qt
              uses: jurplel/install-qt-action@v4
              with:
                arch: 'win64_msvc2022_arm64'
                cache: true
                cache-key-prefix: 'cache'
                modules: 'debug_info qt5compat qtactiveqt qtcharts qtconnectivity qtgraphs qtgrpc qthttpserver qtimageformats qtlanguageserver qtlocation qtlottie qtmultimedia qtnetworkauth qtpositioning qtquick3d qtquick3dphysics qtquicktimeline qtremoteobjects qtscxml qtsensors qtserialbus qtserialport qtshadertools qtspeech qtvirtualkeyboard qtwebchannel qtwebsockets'
                version: ${{ env.QT_VERSION }}

            - name: Setup MSVC
              uses: ilammy/msvc-dev-cmd@v1
              with:
                arch: arm64
                vsversion: 2022

            - name: Setup MSYS2
              uses: msys2/setup-msys2@v2
              with:
                msystem: CLANGARM64
                update: true
                install: >-
                  curl
                  git
                  make
                  mingw-w64-clang-aarch64-clang
                  unzip

            - name: Build SQLite
              run: |
                $htmlContent = Invoke-WebRequest -Uri "https://sqlite.org/download.html" | Select-Object -ExpandProperty Content
                $regex = [regex]::new('PRODUCT,(\d+\.\d+\.\d+),(\d+/sqlite-amalgamation-\d+\.zip),\d+,(.+)')
                $match = $regex.Match($htmlContent)
                $relativeUrl = $match.Groups[2].Value
                $downloadLink = "https://sqlite.org/$relativeUrl"
                Invoke-WebRequest -Uri $downloadLink -OutFile 'sqlite.zip'
                Expand-Archive -Path sqlite.zip -DestinationPath C:\dev\
                Move-Item -Path C:\dev\sqlite-amalgamation-* C:\dev\SQLite\
                cd C:\dev\SQLite
                cl sqlite3.c -DSQLITE_ENABLE_FTS5 -DSQLITE_ENABLE_FTS3 -DSQLITE_ENABLE_FTS3_PARENTHESIS -DSQLITE_ENABLE_STAT4 -DSQLITE_SOUNDEX -DSQLITE_ENABLE_JSON1 -DSQLITE_ENABLE_GEOPOLY -DSQLITE_ENABLE_RTREE -DSQLITE_ENABLE_MATH_FUNCTIONS -DSQLITE_MAX_ATTACHED=125 -DSQLITE_API="__declspec(dllexport)" -link -dll -out:sqlite3.dll

            - name: Build SQLean extension
              shell: msys2 {0}
              run: |
                git clone https://www.github.com/nalgeon/sqlean /c/dev/sqlean
                cd /c/dev/sqlean
                cp /c/a/sqlitebrowser/sqlitebrowser/installer/windows_on_arm/add_sqlean_arm64_target.patch .
                git apply --ignore-space-change --ignore-whitespace add_sqlean_arm64_target.patch
                make prepare-dist
                make download-sqlite
                make download-external
                make compile-windows-arm64

            - name: Build 'formats' Extensions
              run: |
                cp .\src\extensions\extension-formats.c C:\dev\SQLite\
                cp .\src\extensions\extension-formats.def C:\dev\SQLite\
                cd C:\dev\SQLite
                cl /MD extension-formats.c -link -dll -def:extension-formats.def -out:formats.dll

            - name: Setup MSVC
              uses: ilammy/msvc-dev-cmd@v1
              with:
                arch: x64
                vsversion: 2022

            - name: Build x64 binaries for build SQLCipher
              run: |
                git clone https://www.github.com/sqlcipher/sqlcipher C:\dev\SQLCipher --branch v4.6.1
                cd C:\dev\SQLCipher
                nmake /f Makefile.msc lemon.exe mkkeywordhash.exe mksourceid.exe src-verify.exe USE_AMALGAMATION=1 NO_TCL=1 SQLITE3DLL=sqlcipher.dll SQLITE3LIB=sqlcipher.lib SQLITE3EXE=sqlcipher.exe LTLINKOPTS="C:\dev\OpenSSL\lib\VC\x64\MD\libcrypto.lib" OPT_FEATURE_FLAGS="-DSQLITE_TEMP_STORE=2 -DSQLITE_HAS_CODEC=1 -DSQLITE_ENABLE_FTS3=1 -DSQLITE_ENABLE_FTS5=1 -DSQLITE_ENABLE_FTS3_PARENTHESIS=1 -DSQLITE_ENABLE_STAT4=1 -DSQLITE_SOUNDEX=1 -DSQLITE_ENABLE_JSON1=1 -DSQLITE_ENABLE_GEOPOLY=1 -DSQLITE_ENABLE_RTREE=1 -DSQLCIPHER_CRYPTO_OPENSSL=1 -DSQLITE_MAX_ATTACHED=125 -IC:\dev\OpenSSL\include\x64"

            - name: Setup MSVC
              uses: ilammy/msvc-dev-cmd@v1
              with:
                arch: arm64
                vsversion: 2022

            - name: Build SQLCipher
              run: |
                cd C:\dev\SQLCipher
                nmake /f Makefile.msc sqlcipher.dll USE_AMALGAMATION=1 NO_TCL=1 SQLITE3DLL=sqlcipher.dll SQLITE3LIB=sqlcipher.lib SQLITE3EXE=sqlcipher.exe LTLINKOPTS="C:\dev\OpenSSL\lib\VC\arm64\MD\libcrypto.lib" OPT_FEATURE_FLAGS="-DSQLITE_TEMP_STORE=2 -DSQLITE_HAS_CODEC=1 -DSQLITE_ENABLE_FTS3=1 -DSQLITE_ENABLE_FTS5=1 -DSQLITE_ENABLE_FTS3_PARENTHESIS=1 -DSQLITE_ENABLE_STAT4=1 -DSQLITE_SOUNDEX=1 -DSQLITE_ENABLE_JSON1=1 -DSQLITE_ENABLE_GEOPOLY=1 -DSQLITE_ENABLE_RTREE=1 -DSQLCIPHER_CRYPTO_OPENSSL=1 -DSQLITE_MAX_ATTACHED=125 -IC:\dev\OpenSSL\include\arm64"
                mkdir sqlcipher
                copy sqlite3.h sqlcipher
                mv VERSION VERSION.txt

            - name: Configure build (SQLite)
              run: |
                mkdir release-sqlite && cd release-sqlite
                cmake -G "Ninja Multi-Config" -DCMAKE_PREFIX_PATH="C:\dev\SQLite" -DQT_MAJOR=Qt6 ..\

            - name: Build (SQLite)
              run: |
                cd release-sqlite
                cmake --build . --config Release

            - name: Configure build (SQLCipher)
              run: |
                mkdir release-sqlcipher && cd release-sqlcipher
                cmake -G "Ninja Multi-Config" -Dsqlcipher=1 -DCMAKE_PREFIX_PATH="C:\dev\OpenSSL;C:\dev\SQLCipher" -DQT_MAJOR=Qt6 ..\

            - name: Build (SQLCipher)
              run: |
                cd release-sqlcipher
                cmake --build . --config Release

            - if: github.event_name != 'pull_request'
              name: Create MSI
              env:
                ExePath: ${{ github.workspace }}
                OpenSSLPath: C:\dev\OpenSSL
                SQLCipherPath: C:\dev\SQLCipher
                SqleanPath: C:\dev\sqlean
                SQLitePath: C:\dev\SQLite
              run: |
                cd installer\windows_on_arm
                ./build.cmd
                $DATE=$(Get-Date -Format "yyyyMMdd")
                if ("${{ inputs.NIGHTLY }}" -eq "true") {
                  mv DB.Browser.for.SQLite-*.msi "DB.Browser.for.SQLite-$DATE-arm64.msi"
                } else {
                  mv DB.Browser.for.SQLite-*.msi "DB.Browser.for.SQLite-dev-$(git rev-parse --short HEAD)-arm64.msi"
                }

            - if: github.event_name != 'pull_request'
              name: Upload artifacts for code signing with SignPath
              id: unsigned-artifacts
              uses: actions/upload-artifact@v7
              with:
                name: build-artifacts-${{ matrix.os }}-arm64-unsigned
                path: installer\windows_on_arm\DB.Browser.for.SQLite-*.msi

            # Change the signing-policy-slug when you release an RC, RTM or stable release.
            - if: github.event_name != 'pull_request'
              name: Code signing with SignPath
              uses: signpath/github-action-submit-signing-request@v2
              with:
                api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
                github-artifact-id: '${{ steps.unsigned-artifacts.outputs.artifact-id }}'
                organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
                output-artifact-directory: .\installer\windows
                project-slug: 'sqlitebrowser'
                signing-policy-slug: 'test-signing'
                wait-for-completion: true

            - if: github.event_name != 'pull_request'
              name: Create ZIP
              run: |
                $DATE=$(Get-Date -Format "yyyyMMdd")
                if ("${{ inputs.NIGHTLY }}" -eq "true") {
                  $FILENAME_FORMAT="DB.Browser.for.SQLite-$DATE-arm64.zip"
                } else {
                  $FILENAME_FORMAT="DB.Browser.for.SQLite-dev-$(git rev-parse --short HEAD)-arm64.zip"
                }
                Start-Process msiexec.exe -ArgumentList "/a $(dir installer\windows_on_arm\DB.Browser.for.SQLite-*.msi) /q TARGETDIR=$PWD\target\" -Wait
                Compress-Archive -Path "target\DB Browser for SQLite\*" -DestinationPath $FILENAME_FORMAT

            - if: github.event_name != 'pull_request' && github.workflow != 'Build (Windows)'
              name: Prepare artifacts
              run: |
                mkdir build-artifacts
                move installer\windows_on_arm\DB.Browser.for.SQLite-*.msi build-artifacts\
                move DB.Browser.for.SQLite-*.zip build-artifacts\
                Compress-Archive -Path build-artifacts\* -DestinationPath build-artifacts-arm64.zip

            - if: github.event_name != 'pull_request' && github.workflow != 'Build (Windows)'
              name: Upload artifacts
              uses: actions/upload-artifact@v7
              with:
                name: build-artifacts-${{ matrix.os }}-arm64
                path: build-artifacts-arm64.zip
        
            - if: github.event_name == 'workflow_dispatch' && github.workflow == 'Build (Windows)'
              name: Release
              uses: softprops/action-gh-release@v2
              with:
                files: installer/windows_on_arm/DB.Browser.for.SQLite-*.msi, DB.Browser.for.SQLite-*.zip
                prerelease: true
                tag_name: ${{ github.sha }}-windows

            - name: Summary
              run: |
                $OPENSSL_VERSION=(C:\dev\OpenSSL\bin\arm64\openssl version) -replace "OpenSSL ([\d\.]+[a-z]+) .*", '$1'
                $QT_VERSION = & "$env:QT_ROOT_DIR\bin\qmake.exe" --version | Select-String "Using Qt version" | ForEach-Object { $_.ToString().Split()[3] }
                $SQLCIPHER_VERSION=(Get-Item "C:\dev\SQLCipher\sqlcipher.dll").VersionInfo.FileVersion
                Select-String -Path "C:\dev\SQLite\sqlite3.h" -Pattern '#define SQLITE_VERSION\s+"([\d\.]+)"' | ForEach-Object {
                  ($_ -match '"([\d\.]+)"') | Out-Null
                  $SQLITE_VERSION=$matches[1]
                }

                echo "## Libaries used" >> $env:GITHUB_STEP_SUMMARY
                echo "OpenSSL: $OPENSSL_VERSION, Qt: $QT_VERSION, SQLCipher: $SQLCIPHER_VERSION, SQLite: $SQLITE_VERSION" >> $env:GITHUB_STEP_SUMMARY
